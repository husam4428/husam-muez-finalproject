<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudScale Project</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; max-width: 500px; border-top: 8px solid #0078d4; }

        p { color: #555; font-size: 18px; line-height: 1.6; }
        .badge { background-color: #e1dfdd; color: #323130; padding: 6px 12px; border-radius: 20px; font-size: 14px; font-weight: bold; display: inline-block; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚀 Welcome to CloudScale!</h1>
        <p>This containerized web application has been successfully deployed to Azure Kubernetes Service (AKS) using CI/CD DevOps best practices.</p>
        <div class="badge">👨‍💻 Deployed by: HOSSAM & Abdulmoez</div>
    </div>

</html>
